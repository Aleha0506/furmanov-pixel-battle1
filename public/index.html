<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пиксель батл Фурманов</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: #121212; 
            /* Фоновое изображение ТЦ Лада */
            background-image: url('background.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; height: 100vh; overflow: hidden;
        }

        h1 { margin: 10px 0; font-size: 24px; z-index: 10; text-shadow: 2px 2px 8px black; }

        /* Верхняя панель управления */
        .top-bar { 
            position: fixed; top: 15px; left: 15px; z-index: 20;
            background: rgba(20, 20, 20, 0.85); padding: 8px 20px; border-radius: 25px;
            display: flex; align-items: center; border: 1px solid #444; backdrop-filter: blur(8px);
        }
        #status { font-weight: bold; min-width: 140px; text-align: center; }

        /* Информер (онлайн и координаты) */
        .informer {
            position: fixed; top: 15px; right: 15px; z-index: 20;
            background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 20px;
            display: flex; gap: 20px; font-size: 14px; border: 1px solid #333;
        }
        .informer span { color: #00ff88; font-weight: bold; }

        /* Палитра справа */
        .palette {
            position: fixed; right: 15px; top: 80px; z-index: 20;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            background: rgba(25, 25, 25, 0.9); padding: 12px; border-radius: 15px;
            border: 1px solid #555; backdrop-filter: blur(10px);
        }
        .color-block {
            width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            border: 2px solid transparent; transition: transform 0.1s;
        }
        .color-block:hover { transform: scale(1.1); }
        .color-block.selected { border-color: white; transform: scale(1.15); box-shadow: 0 0 12px white; }

        #viewport {
            width: 100vw; height: 100vh;
            overflow: hidden; cursor: move;
            display: flex; align-items: center; justify-content: center;
            touch-action: none;
        }

        #canvas { 
            background: white; image-rendering: pixelated; 
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            cursor: pointer; /* Белый палец из Windows */
        }
    </style>
</head>
<body>
    <h1>Пиксель батл Фурманов</h1>
    
    <div class="top-bar">
        <div id="status">Загрузка...</div>
    </div>

    <div class="informer">
        Онлайн: <span id="onlineCount">0</span>
        Координаты: <span id="coords">[X, Y]</span>
    </div>

    <div class="palette" id="palette"></div>

    <div id="viewport">
        <canvas id="canvas" width="1000" height="1000"></canvas>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const viewport = document.getElementById('viewport');
        const statusEl = document.getElementById('status');
        const onlineEl = document.getElementById('onlineCount');
        const coordsEl = document.getElementById('coords');
        const paletteEl = document.getElementById('palette');

        const GRID_SIZE = 200; 
        const CELL_SIZE = canvas.width / GRID_SIZE;
        
        let scale = 1.8, offsetX = 0, offsetY = 0;
        let inCooldown = false;
        let selectedColor = '#ee0101'; // Стандартный красный из твоей палитры

        const FurmanovPalette = [
            '#ffffff', '#e6e6e6', '#9e9e9e', '#363636', '#000000', '#5a3a2a', '#a67d56', '#fdca96',
            '#710617', '#c2183e', '#ee0101', '#ee1970', '#fcb4cb', '#bd007c', '#e49301', '#f7ac01',
            '#ffff00', '#fff3cd', '#00753e', '#1dbd01', '#94eb39', '#018375', '#0000ff', '#0097f4',
            '#3d95ff', '#00ced1', '#59dedf', '#5836c4', '#6a65ff', '#b033d4', '#8d00ad', '#1c1f2b'
        ];

        function initPalette() {
            FurmanovPalette.forEach(color => {
                const block = document.createElement('div');
                block.className = 'color-block';
                block.style.backgroundColor = color;
                if (color === selectedColor) block.classList.add('selected');
                block.onclick = () => {
                    document.querySelector('.color-block.selected')?.classList.remove('selected');
                    block.classList.add('selected');
                    selectedColor = color;
                };
                paletteEl.appendChild(block);
            });
        }

        function drawPixel(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }

        socket.on('init', (board) => {
            statusEl.innerText = "Можно рисовать!";
            statusEl.style.color = "#4CAF50";
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    drawPixel(x, y, board[y][x]);
                }
            }
            initPalette();
            updateTransform();
        });

        socket.on('update', (data) => drawPixel(data.x, data.y, data.color));
        
        socket.on('online_count', (count) => onlineEl.innerText = count);

        socket.on('cooldown_start', (ms) => {
            inCooldown = true;
            let timeLeft = ms / 1000;
            statusEl.style.color = "#FF5252";
            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    inCooldown = false;
                    statusEl.innerText = "Можно рисовать!";
                    statusEl.style.color = "#4CAF50";
                } else {
                    statusEl.innerText = `Жди: ${timeLeft} сек`;
                }
            }, 1000);
        });

        function updateTransform() {
            canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }

        function updateCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((clientX - rect.left) / (CELL_SIZE * scale));
            const y = Math.floor((clientY - rect.top) / (CELL_SIZE * scale));
            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                coordsEl.innerText = `[${x}, ${y}]`;
            } else {
                coordsEl.innerText = "[Вне поля]";
            }
        }

        viewport.onwheel = (e) => {
            e.preventDefault();
            scale = Math.min(Math.max(0.4, scale * (e.deltaY > 0 ? 0.85 : 1.15)), 25);
            updateTransform();
        };

        let isDragging = false, startX, startY, lastX, lastY;

        viewport.onmousedown = (e) => {
            isDragging = true;
            startX = lastX = e.clientX; startY = lastY = e.clientY;
        };

        window.onmousemove = (e) => {
            updateCoords(e.clientX, e.clientY);
            if (!isDragging) return;
            offsetX += e.clientX - lastX; offsetY += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            updateTransform();
        };

        window.onmouseup = (e) => {
            if (!isDragging) return;
            const dist = Math.hypot(e.clientX - startX, e.clientY - startY);
            if (dist < 5 && e.button === 0 && !inCooldown) {
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / (CELL_SIZE * scale));
                const y = Math.floor((e.clientY - rect.top) / (CELL_SIZE * scale));
                if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                    socket.emit('draw', { x, y, color: selectedColor });
                }
            }
            isDragging = false;
        };

        // Поддержка тач-скринов
        viewport.ontouchstart = (e) => {
            const t = e.touches[0];
            startX = lastX = t.clientX; startY = lastY = t.clientY;
            isDragging = true;
        };
        viewport.ontouchmove = (e) => {
            if (!isDragging) return;
            const t = e.touches[0];
            offsetX += t.clientX - lastX; offsetY += t.clientY - lastY;
            lastX = t.clientX; lastY = t.clientY;
            updateTransform();
            e.preventDefault();
        };
        viewport.ontouchend = (e) => {
            const t = e.changedTouches[0];
            if (Math.hypot(t.clientX - startX, t.clientY - startY) < 10) {
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((t.clientX - rect.left) / (CELL_SIZE * scale));
                const y = Math.floor((t.clientY - rect.top) / (CELL_SIZE * scale));
                if (!inCooldown && x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                    socket.emit('draw', { x, y, color: selectedColor });
                }
            }
            isDragging = false;
        };
    </script>
</body>
</html>
